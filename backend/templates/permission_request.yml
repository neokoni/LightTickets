name: "权限申请"
description: "申请权限组或特殊节点"
title_prefix: "[权限] "
labels: []
body:
  - type: textarea
    id: reason
    validations:
      required: true
    attributes:
      label: "申请理由"
  - type: input
    id: permission
    validations:
      required: false
    attributes:
      label: "权限节点（选填）"
      placeholder: "如 essentials.fly"
completion_hooks:
  - event: closed
    type: minimessage
    messages:
      - "<color:#ffffff>你的权限申请 </color><color:#96bfff>#{ticket_id}</color><color:#ffffff> 已通过</color>"
  - event: invalid
    type: minimessage
    messages:
      - "<color:#ffffff>你的权限申请 </color><color:#96bfff>#{ticket_id}</color><color:#ff8181> 已被拒绝</color>"
