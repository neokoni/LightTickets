name: "权限申请"
description: "申请权限组或特殊节点"
title_prefix: "[权限] "
labels: []
body:
  - type: textarea
    id: reason
    validations:
      required: true
    attributes:
      label: "申请理由"
  - type: dropdown
    id: permission
    validations:
      required: true
    attributes:
      label: "权限节点/权限组"
      description: ""
      options:
        - "Bot权限"
completion_hooks:
  - event: closed
    type: minimessage
    if: "{field.permission}==Bot权限"
    messages:
      - "<color:#ffffff>你的权限申请 </color><color:#96bfff>#{ticket_id}</color><color:#ffffff> 已通过</color>"
  - event: closed
    type: command
    if: "{field.permission}==Bot权限"
    commands:
      - "tell {player_name} 已添加Bot权限 #{ticket_id} "
  - event: invalid
    type: minimessage
    messages:
      - "<color:#ffffff>你的权限申请 </color><color:#96bfff>#{ticket_id}</color><color:#ff8181> 已被拒绝</color>"
