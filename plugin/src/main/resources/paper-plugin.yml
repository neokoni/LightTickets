name: LightTickets
description: $description
prefix: ${prefix}
version: '${version}'

main: ink.neokoni.lightTickets.LightTickets
loader: ink.neokoni.lightTickets.LightTicketsLoader
api-version: '1.21'
folia-supported: true

authors: [ Neokoni ]

permissions:
  lighttickets.*:
    description: "LightTickets 全部权限"
    default: op
    children:
      - lighttickets.admin
      - lighttickets.player
  lighttickets.admin:
    description: "LightTickets 管理权限"
    children:
      - lighttickets.reload
  lighttickets.player:
    description: "LightTickets 玩家权限"
    children:
      - lighttickets.bind
      - lighttickets.unbind
      - lighttickets.register
      - lighttickets.account
      - lighttickets.ticket.create
      - lighttickets.ticket.list
      - lighttickets.ticket.info
      - lighttickets.ticket.comment
  lighttickets.reload:
    description: "重载插件"
    default: op
  lighttickets.bind:
    description: "绑定 LightTickets 账号"
    default: true
  lighttickets.unbind:
    description: "解绑 LightTickets 账号"
    default: true
  lighttickets.register:
    description: "通过 Minecraft 注册 LightTickets 账号"
    default: true
  lighttickets.account:
    description: "查看账号绑定信息"
    default: true
  lighttickets.ticket.create:
    description: "创建议题"
    default: true
  lighttickets.ticket.list:
    description: "查看议题列表"
    default: true
  lighttickets.ticket.info:
    description: "查看议题详情"
    default: true
  lighttickets.ticket.comment:
    description: "评论/回复议题"
    default: true
